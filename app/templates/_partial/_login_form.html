<!-- 登录表单 -->
<h1 class="auth-title">登录 {{ config.TITLE }}</h1>

<form method="post" class="auth-form" id="loginForm" action="{{ url_for('auth.login') }}">
    <div class="form-group">
        <div class="input-group">
            <span class="input-icon"><i class="fas fa-user"></i></span>
            <input type="text" id="username" name="username" class="form-control" required autocomplete="username" placeholder="用户名">
        </div>
    </div>
    
    <div class="form-group">
        <div class="input-group">
            <span class="input-icon"><i class="fas fa-lock"></i></span>
            <input type="password" id="password" name="password" class="form-control" required autocomplete="current-password" placeholder="密码">
        </div>
    </div>
    
    <button type="button" class="btn btn-primary btn-block" id="loginButton">
        <i class="fas fa-sign-in-alt"></i> 登录
    </button>
</form>

<div class="auth-footer">
    <p>还没有账号？ <a href="{{ url_for('ajax.ajax_page', page_name='register') }}" class="ajax-nav-link" data-page="register">立即注册</a></p>
</div>
