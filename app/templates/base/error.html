{% extends 'base.html' %}

{% block title %}Error {{ error_code }} | {{ config.TITLE }}{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-box">
        <h1>{{ error_code }}</h1>
        <h2>{{ error_message }}</h2>
        <p>很抱歉，发生了错误。</p>
        <a href="{{ url_for('main.index') }}" class="btn btn-primary">返回首页</a>
    </div>
</div>
{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/error.css') }}">
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/error.js') }}"></script>
{% endblock %}
