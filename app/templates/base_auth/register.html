{% extends 'base_auth.html' %}

{% block title %}注册 | {{ config.TITLE }}{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-logo">
        <img src="../static/img/logo.webp" style="height: 96px; width: 96px"></img>
    </div>
    <h1 class="auth-title">注册账号</h1>
    
    <form method="post" class="auth-form" id="registerForm">
        <div class="form-group">
            <label for="username" class="form-label">用户名</label>
            <div class="input-group">
                <span class="input-icon"><i class="fas fa-user"></i></span>
                <input type="text" id="username" name="username" class="form-control" required autocomplete="username" placeholder="请设置用户名">
            </div>
        </div>
        
        <div class="form-group">
            <label for="password" class="form-label">密码</label>
            <div class="input-group">
                <span class="input-icon"><i class="fas fa-lock"></i></span>
                <input type="password" id="password" name="password" class="form-control" required autocomplete="new-password" placeholder="请设置密码">
            </div>
        </div>
        
        <div class="form-group">
            <label for="confirm_password" class="form-label">确认密码</label>
            <div class="input-group">
                <span class="input-icon"><i class="fas fa-lock"></i></span>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" required autocomplete="new-password" placeholder="请再次输入密码">
            </div>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block">
            <i class="fas fa-user-plus"></i> 创建账号
        </button>
    </form>
    
    <div class="auth-footer">
        <p>已有账号？ <a href="{{ url_for('auth.login') }}">立即登录</a></p>
    </div>
    <!-- 页脚 -->
    <footer style="text-align: center; margin-top: 2rem; color: var(--gray-600);">
        <p class="footer-text">
            &copy; 
            <span id="copyright-year"></span> 
            {{ config.TITLE }} 考试猫 | By <a href="https://github.com/AngellNeverBe" class="footer-link" target="_blank" rel="noopener noreferrer">paracat</a>
            <br>
            Powered By <a href="https://github.com/CiE-XinYuChen/EXAM-MASTER" class="footer-link" target="_blank" rel="noopener noreferrer">ExamMaster</a>
        </p>
    </footer>
</div>

{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/register.js') }}"></script>
<script>
    (function() {
        const currentYear = new Date().getFullYear();
        const creationYear = 2026;
        const yearSpan = document.getElementById('copyright-year');
        
        if (currentYear === creationYear) {
        yearSpan.textContent = creationYear;
        } else if (currentYear > creationYear) {
        yearSpan.textContent = `${creationYear}-${currentYear}`;
        } else {
        // 如果当前年份小于创建年份（理论上不会发生）
        yearSpan.textContent = creationYear;
        }
    })();
</script>
{% endblock %}
